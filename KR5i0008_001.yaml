front:
  text: 太上老君說常清靜真經重刊道藏輯要太上老君說常淸靜真經八洞仙祖合注
  hash: sha256:defdbfe1262d584bc35fbf9e872b858bd094d311c8a26eba7e176f22e956669f
  markers:
  - {type: page-break, offset: 10, content: '', id: CK-KZ_KR5i0008_01p001a}
body:
  text: 天地之道恆久而不已君子法天行之健亦用是自强而不息中庸引詩既曰於穆不已又引文德之純曰純亦不已若此者皆發明太上淸靜經一箇常字人患無常倘少雜不克常自淸淨終不得為淸靜也老君曰大道無形生育天地大道無情運行日月大道無名長養萬物吾不知其名强名曰道兩儀奠定而後天地之位立矣天地有形者也而生是天地者郤自無形無形者何道也自烏兔代嬗而出日月之運見矣日月有情者也而生是日月者郤自無情無情者何道也自是而品物流形有知無知長養於天地日月中者物之數號萬矣萬物皆有名者也而生是萬物者亦自無名無名者何道也是道也其名何昉乎曰無所昉也亦第摹擬髣佛强為名之曰道而已矣夫道者有淸有濁有動有靜天淸地濁天動地靜男淸女濁男動女靜降本流末而生萬物自有天地萬物以來淸濁動靜之分昭然若揭矣而不知其淸濁動靜固自大道中來惟道有淸濁動靜斯敦化而川流於以各具道之一體而分形著見如天則得道之淸而淸也地則得道之濁而濁也而男象天則禀天之淸者實本道之淸女象地則禀地之濁者實本道之濁而或動以直或靜以翕天地男女亦罔不適肖乎道道非天地男女之大範圍也乎故既有天地則生男女既有男女則生萬物是一本而散為萬殊者也淸者濁之源動者靜之基人能常淸靜天地悉皆歸夫以天地之大男女之繁而皆不出乎淸濁動靜之外則是淸濁動靜烏容不窮其旨哉淸與濁相反逮由淸而濁不見為淸矣要其所以淸者固自在也濁激則仍淸淸固濁之源也動與靜相反逮動極而靜不見其動矣要其所以動者本根於靜也動而無動猶是靜而無靜也此動所以為靜之基也人特患不能淸靜耳即能淸而不能常守能靜而不能常貞終不得謂之淸靜即不得謂之常淸靜也果其能之則配天地而無疆矣兩大有不歸之也哉夫人神好淸而心擾之人心好靜而欲牽之常能遣其欲而心自靜澄其心而神自淸自然六欲不生三毒消滅是淸靜也領於谷神而持於無心者也神未嘗不好淸而妄心擾之則神不勝妄矣心好靜而私欲牽之則心不勝私矣邪正不兩立固自彰彰若是果能遣其私欲之滋澄其本心之明而心罔有不靜神罔有不淸維彼六欲三毒各自消滅而無或萌蘖之竊發矣所以不能者為心未澄欲未遣也能遣之者內觀其心心無其心外觀其形形無其形遠觀其物物無其物此亦人人共能之事而衆生所以不能者心未之澄欲未之遣也惟心不澄則從心生形從心生物而妄心競起不可究詰是皆有心之見者存而心遂相牽於胡底於此而有能遣之者不惟外觀遠觀無形無物即內觀其心而亦心無其心心且無矣亦何有形與物哉三者既悟惟見於空觀空亦空空無所空所空既無無無亦無無無既無湛然常寂夫無心因以無形而無物一朝頓悟萬象皆空謂之三者見空可也不僅三者見空其亦可也夫於實處見空而遂執以為空則猶有空之所也有空之所尚非真空惟空無所空則雖在空中並不知其為空則是所謂無也而要之無無亦無猶是空無所空則第湛然常寂也云爾寂無所寂欲豈能生欲既不生即是真靜真常應物真常得性常應常靜常淸靜矣逮至寂亦無所寂則吾心即天之心地之心亦即道之心矣道本渾渾噩噩不可名有亦不可名無者也心印乎道欲亦何自生乎欲既不生即是真淸而真靜矣惟真則可以應酬乎萬物亦惟真則可以自得其本性而再矢之以常豈不常淸而常靜也哉如此淸靜漸入真道既入真道名為得道雖名得道實無所得為化衆生名為得道能悟之者可傳聖道夫道本淸靜者也我既如此淸靜則可以漸入乎真道矣入道即可以名得道矣然便謂之得則尚非空無所空寂無所寂無無亦無之道也故雖名得道而實無得之之所本不可以言得乃以化衆生而不以實有所得誘之彼衆生安肯向淸靜路上來則不得不以得道名之也世人能悟到此豈不可以傳聖道乎哉老君曰上士無爭下士好爭上德不德下德執德執著之者不名道德道在淸靜如是知之者欲得乎道而恥不得乎道於是乎爭心起焉偶或得之則拳拳執持而弗敢失爭之執之似也然此下士之所為而上士不出此也上士則無爭而德不德矣總之道無定方於此而寓於彼而寓淸者道也濁者亦道靜者道也動者亦道人能看得大道圓通方可頭頭見道而無取乎執著為也若執著之則不名道德矣此無起執著天經所以致警於斷障也夫衆生所以不得真道者為有妄心既有妄心即驚其神既驚其神即著萬物既著萬物即生貪求既生貪求即是煩惱煩惱妄想憂苦身心便遭濁辱流浪生死常沉苦海永失真道執著之見固不可有而虛妄之心尤不可萌一有妄心則神出乎舍驚而弗得寧矣神驚而弗寧則物交物而紛華靡麗比比相著而貪求之念自不能已逮求之弗得煩惱叢生而身心皆為之憂苦於是乎淸者全淪於濁中而不驚其寵輒遭其辱以致流浪生死常沉滯夫苦海永失乎真道是可哀矣真常之道悟者自得得悟道者常淸靜矣第是真道也淸為真淸靜為真靜而得之者斷未有不自能悟來果能悟得這箇道空而無空寂而無寂則亦淸而無淸靜而無靜矣夫何有不常淸常靜而為荷道之偉人也哉甚矣太上此篇淸靜之言固與道德經相表裏者也至矣蔑以加矣於是八洞仙祖相與共訂真經祕髓復敬為總注曰道本無何有形何有情又何有名形無則真空見情無則妄念捐名無則萬緣息無諸繫滯自無貪求無或貪求自無煩惱不生動隙夫安有動不著濁根夫安有濁即濁是淸即動是靜靜而無靜斯為真靜淸而無淸斯為真淸蓋空以無所空為空寂以無所寂為寂方能化去執著悟入元關一滯聲色迷惑有無是心是身焉得淸靜八祖既指陳祕要又復共賡以咏嘆之曰心心心果有心究何心身身身果有身究何身是心道之心道之心曰無心是身道之身道之身曰無身無身而身靜無心而心淸身心淸靜而無形以還大道之無形身心淸靜而無情以還大道之無情身心淸靜而無名以還大道之無名是為淸靜之傳燈仙翁葛祖曰吾得真道曾誦此經萬遍此經是天人所習不傳下士吾昔受之於東華帝君東華帝君受之於金闕帝君金闕帝君受之於西王母以上皆係口口相傳不記文字吾今於世書而録之上士悟之升為天官中士修之南宫列仙下士得之在世長年遊行三界升入金門左元真人曰學道之士持誦此經者即得十天善神擁護其身然後玉符保神金液煉形形神俱妙與道合真正一真人曰人家有此經悟解之者災障不干衆聖護門神升上界朝拜高尊功滿德就相感帝君誦持不退身騰紫雲常淸常靜天尊三稱
